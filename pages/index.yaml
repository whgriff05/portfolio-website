  ## About Me 
  
  Hi, I'm __Will Griffin__, a sophomore at the [University of Notre Dame](https://nd.edu) studying Computer Science with minors in Engineering Corporate Practice and Liturgical Music Ministry. I'm originally from Fishers, IN, and on campus, I am a resident of [Coyle Hall](https://www.coylehallnd.com).<br>

  <br>

  I'm interested in low-level computing with proficiencies in __C__ and __Bash__, and I am interested in studying __Operating Systems__, __Programming Languages and Compilers__, __Optimized Computing__, and __Networking__.<br>

  <br>

  Outside of the classroom, I have also made a few personal tools such as [pymd](https://github.com/whgriff05/pymd), a terminal markdown viewer to visualize class notes using Python and ncurses, and [pomodoro](https://github.com/whgriff05/pomodoro), a small pomodoro timer application made with C and Raylib. In addition, I've started self-hosting projects such as this website and soju, an IRC bouncer, for the [NDLUG](https://ndlug.org) IRC.<br>

  <br>

  Apart from tech, I am also highly interested in music, being a pianist, organist, and self-taught guitarist. I sing in the [Notre Dame Liturgical Choir](https://litchoir.nd.edu) and accompany Masses for both my dorm's chapel and my home parish. I also enjoy cooking, reading history, lifting, and bar trivia.<br>

  <br>

  Feel free to get in touch with me via [whgriff24@gmail.com](mailto:whgriff24@gmail.com) or [LinkedIn](https://www.linkedin.com/in/william-henry-griffin/)!

